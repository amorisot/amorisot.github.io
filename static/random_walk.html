<path fill-rule="evenodd" clip-rule="evenodd" d="M11700 6314.26L9378.53 6314.26L9378.53 6314.26C9378.53 4365.49 7798.74 2785.7 5849.98 2785.7C3901.21 2785.7 2321.42 4365.49 2321.42 6314.26L2321.42 6314.26L-4.62797e-05 6314.26L0.000976562 464.283L11700 464.285L11700 6314.26Z" fill="black"/>
</svg>`;
        logoImg.onload = () => { logoReady = true; };
        logoImg.src = 'data:image/svg+xml;base64,' + btoa(logoSvg);

        // === UTILITIES ===

        function gaussianRandom() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        function clamp(val, min, max) {
            return val < min ? min : val > max ? max : val;
        }

        function dist2(ax, ay, bx, by) {
            const dx = ax - bx, dy = ay - by;
            return dx * dx + dy * dy;
        }

        function wrapText(text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let current = '';
            for (const word of words) {
                const test = current ? current + ' ' + word : word;
                if (ctx.measureText(test).width > maxWidth && current) {
                    lines.push(current);
                    current = word;
                } else {
                    current = test;
                }
            }
            if (current) lines.push(current);
            return lines;
        }

        function screenToWorld(sx, sy) {
            return {
                x: (sx - W / 2) / camera.zoom + camera.x,
                y: (sy - H / 2) / camera.zoom + camera.y
            };
        }

        function getVisibleRect() {
            const halfW = (W / 2) / camera.zoom;
            const halfH = (H / 2) / camera.zoom;
            return {
                left: camera.x - halfW,
                right: camera.x + halfW,
                top: camera.y - halfH,
                bottom: camera.y + halfH
            };
        }

        // === VORONOI: HALF-PLANE CLIPPING ===

        function clipPolygon(polygon, mx, my, nx, ny) {
            const out = [];
            const len = polygon.length;
            if (len === 0) return out;

            for (let i = 0; i < len; i++) {
                const curr = polygon[i];
                const next = polygon[(i + 1) % len];
                const dCurr = (curr.x - mx) * nx + (curr.y - my) * ny;
                const dNext = (next.x - mx) * nx + (next.y - my) * ny;

                if (dCurr <= 0) {
                    out.push(curr);
                    if (dNext > 0) {
                        const t = dCurr / (dCurr - dNext);
                        out.push({
                            x: curr.x + t * (next.x - curr.x),
                            y: curr.y + t * (next.y - curr.y)
                        });
                    }
                } else if (dNext <= 0) {
                    const t = dCurr / (dCurr - dNext);
                    out.push({
                        x: curr.x + t * (next.x - curr.x),
                        y: curr.y + t * (next.y - curr.y)
                    });
                }
            }
            return out;
        }

        function computeVoronoiPolygons(seeds) {
            const pad = 100;
            const polygons = [];

            for (let i = 0; i < seeds.length; i++) {
                let poly = [
                    { x: -pad, y: -pad },
                    { x: WORLD_W + pad, y: -pad },
                    { x: WORLD_W + pad, y: WORLD_H + pad },
                    { x: -pad, y: WORLD_H + pad }
                ];

                const others = [];
                for (let j = 0; j < seeds.length; j++) {
                    if (j === i) continue;
                    others.push({ idx: j, d: dist2(seeds[i].x, seeds[i].y, seeds[j].x, seeds[j].y) });
                }
                others.sort((a, b) => a.d - b.d);

                for (const other of others) {
                    const j = other.idx;
                    const mx = (seeds[i].x + seeds[j].x) / 2;
                    const my = (seeds[i].y + seeds[j].y) / 2;
                    const nx = seeds[j].x - seeds[i].x;
                    const ny = seeds[j].y - seeds[i].y;
                    poly = clipPolygon(poly, mx, my, nx, ny);
                    if (poly.length < 3) break;
                }

                polygons.push(poly);
            }
            return polygons;
        }

        function polygonCentroid(vertices) {
            if (vertices.length < 3) return { x: 0, y: 0 };
            let cx = 0, cy = 0, area = 0;
            for (let i = 0; i < vertices.length; i++) {
                const j = (i + 1) % vertices.length;
                const cross = vertices[i].x * vertices[j].y - vertices[j].x * vertices[i].y;
                area += cross;
                cx += (vertices[i].x + vertices[j].x) * cross;
                cy += (vertices[i].y + vertices[j].y) * cross;
            }
            area /= 2;
            if (Math.abs(area) < 1e-10) {
                let sx = 0, sy = 0;
                for (const v of vertices) { sx += v.x; sy += v.y; }
                return { x: sx / vertices.length, y: sy / vertices.length };
            }
            cx /= (6 * area);
            cy /= (6 * area);
            return { x: cx, y: cy };
        }

        // === SEED GENERATION ===

        function generateSeeds() {
            const seeds = [];
            const cx = WORLD_W / 2;
            const cy = WORLD_H / 2;

            // Core sectors in a ring near center
            const coreRadius = Math.min(WORLD_W, WORLD_H) * 0.025;
            for (let i = 0; i < CORE_SECTORS.length; i++) {
                const angle = (i / CORE_SECTORS.length) * 2 * Math.PI + (Math.random() - 0.5) * 0.3;
                const r = coreRadius + (Math.random() - 0.5) * coreRadius * 0.3;
                seeds.push({
                    x: cx + r * Math.cos(angle),
                    y: cy + r * Math.sin(angle),
                    name: CORE_SECTORS[i],
                    isCore: true
                });
            }

            // Other sectors distributed across the world
            for (let i = 0; i < OTHER_SECTORS.length; i++) {
                let x, y, tooClose;
                let attempts = 0;
                do {
                    x = MARGIN + Math.random() * (WORLD_W - 2 * MARGIN);
                    y = MARGIN + Math.random() * (WORLD_H - 2 * MARGIN);
                    tooClose = false;
                    const minDist2 = Math.pow(Math.min(WORLD_W, WORLD_H) * 0.012, 2);
                    for (const s of seeds) {
                        if (dist2(x, y, s.x, s.y) < minDist2) {
                            tooClose = true;
                            break;
                        }
                    }
                    attempts++;
                } while (tooClose && attempts < 30);

                seeds.push({
                    x, y,
                    name: OTHER_SECTORS[i],
                    isCore: false
                });
            }

            return seeds;
        }

        // === INIT ===

        function init() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;

            if (initialized) return;

            WORLD_W = W * WORLD_SCALE;
            WORLD_H = H * WORLD_SCALE;

            const seeds = generateSeeds();

            // Lloyd relaxation
            for (let iter = 0; iter < LLOYD_ITERATIONS; iter++) {
                const polys = computeVoronoiPolygons(seeds);
                for (let i = 0; i < seeds.length; i++) {
                    if (seeds[i].isCore && iter > 1) continue;
                    if (polys[i].length < 3) continue;
                    const c = polygonCentroid(polys[i]);
                    seeds[i].x = clamp(c.x, MARGIN, WORLD_W - MARGIN);
                    seeds[i].y = clamp(c.y, MARGIN, WORLD_H - MARGIN);
                }
            }

            // Final Voronoi
            const polygons = computeVoronoiPolygons(seeds);

            // Build cells
            cells = ALL_SECTORS.map((name, i) => {
                const poly = polygons[i];
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const v of poly) {
                    if (v.x < minX) minX = v.x;
                    if (v.x > maxX) maxX = v.x;
                    if (v.y < minY) minY = v.y;
                    if (v.y > maxY) maxY = v.y;
                }
                const cellW = maxX - minX;
                const cellH = maxY - minY;
                const colorIdx = Math.floor((i * PHI_INV * PALETTE.length) % PALETTE.length);
                // Scale font to cell: aim for text to fill ~60% of cell width
                const wordCount = name.split(' ').length;
                const avgCharsPerLine = wordCount <= 2 ? name.length : name.length / 2;
                const targetFontSize = Math.min(cellW * 0.6 / Math.max(avgCharsPerLine * 0.55, 1), cellH * 0.2);
                return {
                    index: i,
                    name: name,
                    seed: { x: seeds[i].x, y: seeds[i].y },
                    polygon: poly,
                    isCore: seeds[i].isCore,
                    visited: false,
                    brightness: 0,
                    color: PALETTE[colorIdx],
                    labelMaxWidth: cellW * 0.75,
                    fontSize: clamp(targetFontSize, 20, 80)
                };
            });

            // Init walker on Nuts & Bolts
            const nutsAndBolts = cells[0].seed;
            walker.x = nutsAndBolts.x;
            walker.y = nutsAndBolts.y;
            walker.vx = 0;
            walker.vy = 0;
            cells[0].visited = true;
            trail = new Array(TRAIL_MAX);
            trailHead = 0;
            trailCount = 0;

            // Init camera on walker
            camera.x = nutsAndBolts.x;
            camera.y = nutsAndBolts.y;
            camera.zoom = 1;
            camera.following = false;

            initialized = true;
        }

        // === WALKER ===

        function updateWalker() {
            walker.vx += WALKER_SIGMA * gaussianRandom();
            walker.vy += WALKER_SIGMA * gaussianRandom();
            walker.vx *= WALKER_DAMPING;
            walker.vy *= WALKER_DAMPING;
            walker.x += walker.vx;
            walker.y += walker.vy;

            const pad = 50;
            if (walker.x < pad) { walker.x = pad; walker.vx = Math.abs(walker.vx) * 0.5; }
            if (walker.x > WORLD_W - pad) { walker.x = WORLD_W - pad; walker.vx = -Math.abs(walker.vx) * 0.5; }
            if (walker.y < pad) { walker.y = pad; walker.vy = Math.abs(walker.vy) * 0.5; }
            if (walker.y > WORLD_H - pad) { walker.y = WORLD_H - pad; walker.vy = -Math.abs(walker.vy) * 0.5; }

            trail[trailHead] = { x: walker.x, y: walker.y };
            trailHead = (trailHead + 1) % TRAIL_MAX;
            if (trailCount < TRAIL_MAX) trailCount++;

            let minD = Infinity, nearest = 0;
            for (let i = 0; i < cells.length; i++) {
                const d = dist2(walker.x, walker.y, cells[i].seed.x, cells[i].seed.y);
                if (d < minD) { minD = d; nearest = i; }
            }
            if (!cells[nearest].visited) {
                cells[nearest].visited = true;
            }
        }

        // === CAMERA ===

        function updateCamera() {
            if (camera.following && !isDragging) {
                camera.x += (walker.x - camera.x) * CAMERA_LERP;
                camera.y += (walker.y - camera.y) * CAMERA_LERP;
            }
        }

        // === RENDERING ===

        function drawPolygonPath(poly) {
            if (poly.length < 3) return;
            ctx.beginPath();
            ctx.moveTo(poly[0].x, poly[0].y);
            for (let i = 1; i < poly.length; i++) {
                ctx.lineTo(poly[i].x, poly[i].y);
            }
            ctx.closePath();
        }

        function render() {
            // White/cream background
            ctx.fillStyle = '#f5f5f0';
            ctx.fillRect(0, 0, W, H);

            // Animate brightness
            for (const cell of cells) {
                if (cell.visited && cell.brightness < 1) {
                    cell.brightness += (1.0 - cell.brightness) * 0.015;
                    if (cell.brightness > 0.99) cell.brightness = 1;
                }
            }

            const vis = getVisibleRect();
            const cullMargin = 800 / camera.zoom;
            const expanded = {
                left: vis.left - cullMargin,
                right: vis.right + cullMargin,
                top: vis.top - cullMargin,
                bottom: vis.bottom + cullMargin
            };

            ctx.save();
            ctx.translate(W / 2, H / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            // Cell fills
            for (const cell of cells) {
                const s = cell.seed;
                if (s.x < expanded.left || s.x > expanded.right ||
                    s.y < expanded.top || s.y > expanded.bottom) continue;

                const [cr, cg, cb] = cell.color;
                if (cell.visited) {
                    const b = cell.brightness;
                    ctx.fillStyle = `rgba(${cr},${cg},${cb},${0.15 + b * 0.55})`;
                } else {
                    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.08)`;
                }
                drawPolygonPath(cell.polygon);
                ctx.fill();
            }

            // Cell borders
            ctx.lineWidth = 1.5;
            for (const cell of cells) {
                const s = cell.seed;
                if (s.x < expanded.left || s.x > expanded.right ||
                    s.y < expanded.top || s.y > expanded.bottom) continue;

                if (cell.visited) {
                    const [cr, cg, cb] = cell.color;
                    const dr = Math.round(cr * 0.6);
                    const dg = Math.round(cg * 0.6);
                    const db = Math.round(cb * 0.6);
                    ctx.strokeStyle = `rgba(${dr},${dg},${db},${0.2 + cell.brightness * 0.4})`;
                } else {
                    ctx.strokeStyle = 'rgba(180,180,170,0.2)';
                }

                drawPolygonPath(cell.polygon);
                ctx.stroke();
            }

            // Labels
            if (camera.zoom > 0.05) {
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (const cell of cells) {
                    const s = cell.seed;
                    if (s.x < vis.left - 500 || s.x > vis.right + 500 ||
                        s.y < vis.top - 500 || s.y > vis.bottom + 500) continue;

                    const fs = cell.fontSize;
                    if (cell.visited) {
                        ctx.font = `700 ${fs}px Helvetica, Arial, sans-serif`;
                        ctx.fillStyle = `rgba(30,30,30,${0.4 + cell.brightness * 0.55})`;
                    } else {
                        ctx.font = `500 ${fs}px Helvetica, Arial, sans-serif`;
                        ctx.fillStyle = 'rgba(80,80,70,0.3)';
                    }

                    const lines = wrapText(cell.name, cell.labelMaxWidth);
                    const lineHeight = fs * 1.3;
                    const startY = s.y - ((lines.length - 1) * lineHeight) / 2;
                    for (let li = 0; li < lines.length; li++) {
                        ctx.fillText(lines[li], s.x, startY + li * lineHeight);
                    }
                }
            }

            // Trail
            if (trailCount > 1) {
                const batchSize = 40;
                const startIdx = trailHead - trailCount;
                for (let b = 0; b < trailCount - 1; b += batchSize) {
                    const end = Math.min(b + batchSize, trailCount - 1);
                    const age = 1 - (b + batchSize / 2) / trailCount;
                    const alpha = 0.6 * (1 - age * 0.85);
                    const lw = 2 * (1 - age * 0.6);

                    ctx.strokeStyle = `rgba(80,80,80,${alpha})`;
                    ctx.lineWidth = lw;
                    ctx.beginPath();
                    const fi = ((startIdx + b) % TRAIL_MAX + TRAIL_MAX) % TRAIL_MAX;
                    ctx.moveTo(trail[fi].x, trail[fi].y);
                    for (let i = b + 1; i <= end; i++) {
                        const idx = ((startIdx + i) % TRAIL_MAX + TRAIL_MAX) % TRAIL_MAX;
                        ctx.lineTo(trail[idx].x, trail[idx].y);
                    }
                    ctx.stroke();
                }
            }

            // Walker: Silmo logo
            if (logoReady) {
                ctx.drawImage(logoImg,
                    walker.x - LOGO_W / 2,
                    walker.y - LOGO_H / 2,
                    LOGO_W, LOGO_H);
            } else {
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(walker.x, walker.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();

            // HUD (screen space)
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.font = '12px Helvetica, Arial, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            const modeText = camera.following
                ? 'Following walker \u2022 click to detach'
                : 'Double-click to follow walker';
            ctx.fillText(modeText, 14, H - 14);

            ctx.textAlign = 'right';
            ctx.fillText('Scroll to zoom \u2022 Drag to pan', W - 14, H - 14);
        }

        // === ANIMATION LOOP ===

        function frame() {
            for (let i = 0; i < STEPS_PER_FRAME; i++) {
                updateWalker();
            }
            updateCamera();
            render();
            requestAnimationFrame(frame);
        }

        // === EVENT HANDLERS ===

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragLastX = e.clientX;
            dragLastY = e.clientY;
            camera.following = false;
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - dragLastX;
            const dy = e.clientY - dragLastY;
            camera.x -= dx / camera.zoom;
            camera.y -= dy / camera.zoom;
            dragLastX = e.clientX;
            dragLastY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const wx = (e.clientX - W / 2) / camera.zoom + camera.x;
            const wy = (e.clientY - H / 2) / camera.zoom + camera.y;

            camera.zoom *= Math.exp(-e.deltaY * ZOOM_SPEED);
            camera.zoom = clamp(camera.zoom, ZOOM_MIN, ZOOM_MAX);

            camera.x = wx - (e.clientX - W / 2) / camera.zoom;
            camera.y = wy - (e.clientY - H / 2) / camera.zoom;
        }, { passive: false });

        canvas.addEventListener('dblclick', () => {
            camera.following = true;
        });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                dragLastX = e.touches[0].clientX;
                dragLastY = e.touches[0].clientY;
                camera.following = false;
                touchStartTime = Date.now();
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - dragLastX;
                const dy = e.touches[0].clientY - dragLastY;
                camera.x -= dx / camera.zoom;
                camera.y -= dy / camera.zoom;
                dragLastX = e.touches[0].clientX;
                dragLastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (lastTouchDist > 0) {
                    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    const wx = (midX - W / 2) / camera.zoom + camera.x;
                    const wy = (midY - H / 2) / camera.zoom + camera.y;

                    camera.zoom *= dist / lastTouchDist;
                    camera.zoom = clamp(camera.zoom, ZOOM_MIN, ZOOM_MAX);

                    camera.x = wx - (midX - W / 2) / camera.zoom;
                    camera.y = wy - (midY - H / 2) / camera.zoom;
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            isDragging = false;
            lastTouchDist = 0;
            const now = Date.now();
            if (now - touchStartTime < 200 && e.touches.length === 0) {
                if (now - lastTapTime < 350) {
                    camera.following = true;
                    lastTapTime = 0;
                } else {
                    lastTapTime = now;
                }
            }
        });

        window.addEventListener('resize', () => {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        });

        // === START ===
        init();
        requestAnimationFrame(frame);
    </script>
</body>
